app = "reachiq-api-kaviesh"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "4001"
  NODE_ENV = "production"
  ENABLE_WEBSITE_VIDEO = "false"
  WEBSITE_VIDEO_DIR = "/data/generated-videos"
  WHATSAPP_QR_SESSION_DIR = "/data/whatsapp-sessions"
  BACKEND_PUBLIC_URL = "https://reachiq-api-kaviesh.fly.dev"
  API_PUBLIC_URL = "https://reachiq-api-kaviesh.fly.dev"
  FRONTEND_URL = "https://reachiq-web-kaviesh.fly.dev"

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  interval = "15s"
  timeout = "10s"
  grace_period = "30s"
  method = "GET"
  path = "/health"

[mounts]
  source = "reachiqdata"
  destination = "/data"
